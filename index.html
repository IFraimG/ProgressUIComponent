<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main__wrapper">
        <div class="main__container">
            <div class="main">
                <h1 class="main__title">Progress</h1>
                <div class="main__content">
                    <custom-progress id="c-pr" value="80" animated="true"></custom-progress>
                    <div class="main__settings">
                        <div class="settings-input__wrapper settings-item">
                            <input id="normal" type="number">
                            <label for="normal">Value</label>
                        </div>
                        <div class="settings-item">
                            <div class="switcher__wrapper">
                                <label class="switcher-item">
                                <input id="animate" class="switcher" type="checkbox" checked="true" />
                                <span class="slider"></span>
                                </label>
                            </div>
                            <label for="animate">Animate</label>
                        </div>
                        
                        <div class="settings-item">
                            <div class="switcher__wrapper">
                                <label class="switcher-item">
                                    <input id="hide" class="switcher" type="checkbox" />
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <label for="hide">Hide</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module" src="./index.js"></script>
</body>
</html>
